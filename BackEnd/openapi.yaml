openapi: 3.0.3
info:
  title: Product Management System API
  version: "1.0.0"
  description: |
    Full OpenAPI spec generated from the current Express routes and controllers.
    Main response shape follows a JSend-like pattern:
    - success: { status: "success", data: ... }
    - fail:    { status: "fail", data: ... }
    - error:   { status: "error", message: "..." }
servers:
  - url: http://localhost:5001
    description: Local development

tags:
  - name: Auth
  - name: Products
  - name: Stock Movements
  - name: Suppliers
  - name: Purchase Invoices
  - name: Sale Invoices
  - name: Returns
  - name: Dashboard
  - name: Users
  - name: Workspaces

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    MongoObjectIdParam:
      in: path
      name: id
      required: true
      schema:
        $ref: '#/components/schemas/MongoId'
    InvoiceIdParam:
      in: path
      name: id
      required: true
      schema:
        $ref: '#/components/schemas/MongoId'
    ItemIdParam:
      in: path
      name: itemId
      required: true
      schema:
        $ref: '#/components/schemas/MongoId'
    UserIdParam:
      in: path
      name: id
      required: true
      schema:
        $ref: '#/components/schemas/MongoId'
    SupplierIdParam:
      in: path
      name: id
      required: true
      schema:
        $ref: '#/components/schemas/MongoId'
    ProductBusinessIdParam:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: Business product id, not MongoDB _id.
      example: P001

  schemas:
    MongoId:
      type: string
      description: MongoDB ObjectId
      pattern: '^[a-fA-F0-9]{24}$'
      example: 65c8d2f8a1b2c3d4e5f67890

    StatusSuccess:
      type: string
      enum: [success]
    StatusFail:
      type: string
      enum: [fail]
    StatusError:
      type: string
      enum: [error]

    JSendError:
      type: object
      required: [status, message]
      properties:
        status:
          $ref: '#/components/schemas/StatusError'
        message:
          type: string
          example: "Unauthorized: Invalid token"

    JSendFail:
      type: object
      required: [status, data]
      properties:
        status:
          $ref: '#/components/schemas/StatusFail'
        data:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items: {}

    EmptySuccess:
      type: object
      required: [status, data]
      properties:
        status:
          $ref: '#/components/schemas/StatusSuccess'
        data:
          type: object

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 50
        total:
          type: integer
          example: 120

    AuthRegisterRequest:
      type: object
      required: [workspaceName, name, email, password]
      properties:
        workspaceName:
          type: string
          example: My Store
        name:
          type: string
          example: Admin
        email:
          type: string
          format: email
          example: admin@mail.com
        password:
          type: string
          minLength: 6
          example: '123456'

    AuthLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@mail.com
        password:
          type: string
          example: '123456'

    WorkspacePublic:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/MongoId'
        name:
          type: string
          example: My Store
        ownerUserId:
          $ref: '#/components/schemas/MongoId'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AuthUser:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/MongoId'
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, user]
        workspaceId:
          $ref: '#/components/schemas/MongoId'
        workspaceName:
          type: string
          nullable: true

    AuthSuccessResponse:
      type: object
      required: [status, data]
      properties:
        status:
          $ref: '#/components/schemas/StatusSuccess'
        data:
          type: object
          properties:
            token:
              type: string
            user:
              $ref: '#/components/schemas/AuthUser'

    RegisterSuccessResponse:
      type: object
      required: [status, data]
      properties:
        status:
          $ref: '#/components/schemas/StatusSuccess'
        data:
          type: object
          properties:
            token:
              type: string
            user:
              $ref: '#/components/schemas/AuthUser'

    Product:
      type: object
      properties:
        id:
          type: string
          example: P001
        name:
          type: string
          example: Engine Oil
        category:
          type: string
          example: Lubricants
        purchasePrice:
          type: number
          example: 50
        salePrice:
          type: number
          example: 70
        minStock:
          type: integer
          minimum: 0
          example: 5
        quantity:
          type: integer
          minimum: 0
          example: 20
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProductCreateRequest:
      type: object
      required: [id, name, category, purchasePrice, salePrice]
      properties:
        id:
          type: string
          example: P001
        name:
          type: string
          example: Engine Oil
        category:
          type: string
          example: Lubricants
        purchasePrice:
          type: number
          minimum: 0
          example: 50
        salePrice:
          type: number
          minimum: 0
          example: 70
        quantity:
          type: integer
          minimum: 0
          default: 0
          example: 20
        minStock:
          type: integer
          minimum: 0
          default: 0
          example: 5
        createdAt:
          type: string
          format: date-time
          description: Optional backward-compatible field.

    ProductUpdateRequest:
      type: object
      description: quantity is not editable here.
      properties:
        id:
          type: string
          example: P002
        name:
          type: string
        category:
          type: string
        purchasePrice:
          type: number
          minimum: 0
        salePrice:
          type: number
          minimum: 0
        minStock:
          type: integer
          minimum: 0

    ProductAdjustStockRequest:
      type: object
      required: [reason]
      properties:
        mode:
          type: string
          enum: [set, delta]
          example: set
        newQuantity:
          type: integer
          minimum: 0
          example: 25
        delta:
          type: integer
          example: -2
        reason:
          type: string
          enum: [inventory_count, opening_balance, damaged, correction, other]
          example: correction
        note:
          type: string
          example: Manual stock correction after count
      description: |
        Use mode=set with newQuantity, or mode=delta with delta.
        note is required when reason is correction or other.

    ProductAutoFillConflictCandidate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string

    ProductListResponse:
      type: object
      required: [status, data]
      properties:
        status:
          $ref: '#/components/schemas/StatusSuccess'
        data:
          type: array
          items:
            $ref: '#/components/schemas/Product'

    ProductResponse:
      type: object
      required: [status, data]
      properties:
        status:
          $ref: '#/components/schemas/StatusSuccess'
        data:
          $ref: '#/components/schemas/Product'

    StockMovement:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/MongoId'
        workspaceId:
          $ref: '#/components/schemas/MongoId'
        productId:
          type: string
          example: P001
        productName:
          type: string
        productCategory:
          type: string
        type:
          type: string
          enum: [purchase, sale, sale_return, adjustment]
        qtyDelta:
          type: integer
          example: -2
        beforeQty:
          type: integer
          example: 10
        afterQty:
          type: integer
          example: 8
        refType:
          type: string
          example: SaleInvoice
        refId:
          type: string
        refCode:
          type: string
          example: INV-001
        reason:
          type: string
          example: correction
        note:
          type: string
        performedByUserId:
          $ref: '#/components/schemas/MongoId'
        performedByName:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    StockMovementListResponse:
      type: object
      required: [status, data]
      properties:
        status:
          $ref: '#/components/schemas/StatusSuccess'
        data:
          type: object
          properties:
            pagination:
              $ref: '#/components/schemas/Pagination'
            movements:
              type: array
              items:
                $ref: '#/components/schemas/StockMovement'

    ProductAdjustStockResponse:
      type: object
      required: [status, data]
      properties:
        status:
          $ref: '#/components/schemas/StatusSuccess'
        data:
          type: object
          properties:
            product:
              $ref: '#/components/schemas/Product'
            movement:
              $ref: '#/components/schemas/StockMovement'

    Supplier:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/MongoId'
        workspaceId:
          $ref: '#/components/schemas/MongoId'
        name:
          type: string
        phone:
          type: string
        address:
          type: string
        notes:
          type: string
        isActive:
          type: boolean
        createdByUserId:
          $ref: '#/components/schemas/MongoId'
        createdByName:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SupplierCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: ABC Supplier
        phone:
          type: string
          example: '01000000000'
        address:
          type: string
          example: Cairo
        notes:
          type: string
        isActive:
          type: boolean
          default: true

    SupplierUpdateRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        address:
          type: string
        notes:
          type: string
        isActive:
          type: boolean

    SupplierResponse:
      type: object
      required: [status, data]
      properties:
        status:
          $ref: '#/components/schemas/StatusSuccess'
        data:
          $ref: '#/components/schemas/Supplier'

    SupplierListResponse:
      type: object
      required: [status, data]
      properties:
        status:
          $ref: '#/components/schemas/StatusSuccess'
        data:
          type: object
          properties:
            pagination:
              $ref: '#/components/schemas/Pagination'
            suppliers:
              type: array
              items:
                $ref: '#/components/schemas/Supplier'

    PurchaseInvoiceItem:
      type: object
      properties:
        _id:
          $ref: '#/components/schemas/MongoId'
        productId:
          type: string
          example: P001
        productName:
          type: string
        productCategory:
          type: string
        purchasePrice:
          type: number
          example: 50
        quantity:
          type: integer
          example: 5

    PurchaseInvoice:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/MongoId'
        workspaceId:
          $ref: '#/components/schemas/MongoId'
        invoiceCode:
          type: string
          example: PUR-001
        supplierId:
          $ref: '#/components/schemas/MongoId'
        supplierName:
          type: string
        status:
          type: string
          enum: [draft, finalized, cancelled]
        createdByUserId:
          $ref: '#/components/schemas/MongoId'
        createdByName:
          type: string
        finalizedAt:
          type: string
          format: date-time
          nullable: true
        finalizedByUserId:
          $ref: '#/components/schemas/MongoId'
          nullable: true
        finalizedByName:
          type: string
        notes:
          type: string
        subtotal:
          type: number
        totalAmount:
          type: number
        totalItemsQty:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/PurchaseInvoiceItem'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PurchaseDraftCreateRequest:
      type: object
      required: [invoiceCode]
      properties:
        invoiceCode:
          type: string
          example: PUR-001
        supplierId:
          $ref: '#/components/schemas/MongoId'
        supplierName:
          type: string
          example: ABC Supplier
        notes:
          type: string

    PurchaseAddItemRequest:
      type: object
      required: [quantity]
      properties:
        productId:
          type: string
          example: P001
        id:
          type: string
          description: Alias of productId.
        name:
          type: string
          example: Engine Oil
        quantity:
          type: integer
          minimum: 1
          example: 5
        purchasePrice:
          type: number
          minimum: 0
          example: 50
        newProduct:
          type: object
          properties:
            id:
              type: string
              example: P900
            name:
              type: string
            category:
              type: string
            salePrice:
              type: number
              minimum: 0
            minStock:
              type: integer
              minimum: 0

    PurchaseUpdateItemRequest:
      type: object
      properties:
        quantity:
          type: integer
          minimum: 1
        purchasePrice:
          type: number
          minimum: 0

    PurchaseInvoiceResponse:
      type: object
      required: [status, data]
      properties:
        status:
          $ref: '#/components/schemas/StatusSuccess'
        data:
          type: object
          properties:
            invoice:
              $ref: '#/components/schemas/PurchaseInvoice'

    PurchaseInvoiceListResponse:
      type: object
      required: [status, data]
      properties:
        status:
          $ref: '#/components/schemas/StatusSuccess'
        data:
          type: object
          properties:
            pagination:
              $ref: '#/components/schemas/Pagination'
            invoices:
              type: array
              items:
                $ref: '#/components/schemas/PurchaseInvoice'

    SaleInvoiceItem:
      type: object
      properties:
        _id:
          $ref: '#/components/schemas/MongoId'
        productId:
          type: string
          example: P001
        productName:
          type: string
        productCategory:
          type: string
        salePrice:
          type: number
          example: 70
        quantity:
          type: integer
          example: 2
        itemDiscountPercent:
          type: number
          example: 0
        returnedQty:
          type: integer
          example: 0
        unitNetPrice:
          type: number
          example: 70

    SaleInvoice:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/MongoId'
        workspaceId:
          $ref: '#/components/schemas/MongoId'
        invoiceCode:
          type: string
          example: INV-001
        name:
          type: string
          example: Walk-in Customer
        status:
          type: string
          enum: [draft, finalized, cancelled]
        createdByUserId:
          $ref: '#/components/schemas/MongoId'
        createdByName:
          type: string
        finalizedAt:
          type: string
          format: date-time
          nullable: true
        finalizedByUserId:
          $ref: '#/components/schemas/MongoId'
          nullable: true
        finalizedByName:
          type: string
        subtotal:
          type: number
        totalDiscountAmount:
          type: number
        totalAmount:
          type: number
        totalItemsQty:
          type: integer
        invoiceDiscountPercent:
          type: number
        returnStatus:
          type: string
          enum: [none, partial, full]
        totalRefundedAmount:
          type: number
        items:
          type: array
          items:
            $ref: '#/components/schemas/SaleInvoiceItem'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SaleInvoiceDraftCreateRequest:
      type: object
      required: [invoiceCode]
      properties:
        invoiceCode:
          type: string
          example: INV-001
        name:
          type: string
          example: Customer Name

    SaleInvoiceAddItemRequest:
      type: object
      required: [quantity]
      properties:
        productId:
          type: string
          example: P001
        id:
          type: string
          description: Alias of productId.
        name:
          type: string
          example: Engine Oil
        quantity:
          type: integer
          minimum: 1
          example: 2

    SaleInvoiceUpdateItemQtyRequest:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
          minimum: 1
          example: 3

    SaleInvoiceDiscountRequest:
      type: object
      required: [invoiceDiscountPercent]
      properties:
        invoiceDiscountPercent:
          type: number
          minimum: 0
          maximum: 100
          example: 10

    SaleInvoiceItemDiscountRequest:
      type: object
      required: [itemDiscountPercent]
      properties:
        itemDiscountPercent:
          type: number
          minimum: 0
          maximum: 100
          example: 5

    SaleInvoiceResponse:
      type: object
      required: [status, data]
      properties:
        status:
          $ref: '#/components/schemas/StatusSuccess'
        data:
          type: object
          properties:
            invoice:
              $ref: '#/components/schemas/SaleInvoice'

    SaleInvoiceListResponse:
      type: object
      required: [status, data]
      properties:
        status:
          $ref: '#/components/schemas/StatusSuccess'
        data:
          type: object
          properties:
            pagination:
              $ref: '#/components/schemas/Pagination'
            invoices:
              type: array
              items:
                $ref: '#/components/schemas/SaleInvoice'

    SaleReturnItem:
      type: object
      properties:
        _id:
          $ref: '#/components/schemas/MongoId'
        productId:
          type: string
        productName:
          type: string
        productCategory:
          type: string
        qtyReturned:
          type: integer
        salePrice:
          type: number
        itemDiscountPercent:
          type: number
        invoiceDiscountPercent:
          type: number
        unitNetPrice:
          type: number
        unitDiscountAmount:
          type: number
        lineRefundAmount:
          type: number
        returnStockStatus:
          type: string
          enum: [restocked, damaged]

    SaleReturn:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/MongoId'
        workspaceId:
          $ref: '#/components/schemas/MongoId'
        invoiceId:
          $ref: '#/components/schemas/MongoId'
        invoiceCode:
          type: string
        invoiceName:
          type: string
        invoiceCreatedAt:
          type: string
          format: date-time
          nullable: true
        invoiceFinalizedAt:
          type: string
          format: date-time
          nullable: true
        invoiceCashierName:
          type: string
        createdByUserId:
          $ref: '#/components/schemas/MongoId'
        createdByName:
          type: string
        type:
          type: string
          enum: [full, partial]
        totalRefundAmount:
          type: number
        totalRefundRestocked:
          type: number
        totalRefundDamaged:
          type: number
        totalReturnedQty:
          type: integer
        stockStatus:
          type: string
          enum: [restocked, damaged, mixed]
        items:
          type: array
          items:
            $ref: '#/components/schemas/SaleReturnItem'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateReturnItemRequest:
      type: object
      required: [productId, qtyReturned, returnStockStatus]
      properties:
        productId:
          type: string
          example: P001
        qtyReturned:
          type: integer
          minimum: 1
          example: 1
        returnStockStatus:
          type: string
          enum: [restocked, damaged]
          example: restocked

    CreateReturnRequest:
      type: object
      required: [invoiceId]
      properties:
        invoiceId:
          $ref: '#/components/schemas/MongoId'
        type:
          type: string
          enum: [full, partial]
        defaultStockStatus:
          type: string
          enum: [restocked, damaged]
          description: Used when making full return without items array.
        items:
          type: array
          items:
            $ref: '#/components/schemas/CreateReturnItemRequest'

    ReturnResponse:
      type: object
      required: [status, data]
      properties:
        status:
          $ref: '#/components/schemas/StatusSuccess'
        data:
          type: object
          properties:
            return:
              $ref: '#/components/schemas/SaleReturn'

    ReturnListResponse:
      type: object
      required: [status, data]
      properties:
        status:
          $ref: '#/components/schemas/StatusSuccess'
        data:
          type: object
          properties:
            pagination:
              $ref: '#/components/schemas/Pagination'
            returns:
              type: array
              items:
                $ref: '#/components/schemas/SaleReturn'

    ReturnsSummaryResponse:
      type: object
      required: [status, data]
      properties:
        status:
          $ref: '#/components/schemas/StatusSuccess'
        data:
          type: object
          properties:
            summary:
              type: object
              properties:
                count:
                  type: integer
                totalRefundAmount:
                  type: number
                totalRefundRestocked:
                  type: number
                totalRefundDamaged:
                  type: number
                totalReturnedQty:
                  type: integer

    InvoiceReturnsResponse:
      type: object
      required: [status, data]
      properties:
        status:
          $ref: '#/components/schemas/StatusSuccess'
        data:
          type: object
          properties:
            invoice:
              type: object
              properties:
                id:
                  $ref: '#/components/schemas/MongoId'
                invoiceCode:
                  type: string
                name:
                  type: string
                status:
                  type: string
                createdAt:
                  type: string
                  format: date-time
                finalizedAt:
                  type: string
                  format: date-time
                  nullable: true
                createdByName:
                  type: string
                subtotal:
                  type: number
                totalDiscountAmount:
                  type: number
                totalAmount:
                  type: number
                invoiceDiscountPercent:
                  type: number
                returnStatus:
                  type: string
                totalRefundedAmount:
                  type: number
            returns:
              type: array
              items:
                $ref: '#/components/schemas/SaleReturn'

    DashboardMeta:
      type: object
      properties:
        mode:
          type: string
          example: last
        label:
          type: string
          example: Last 30 days
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time

    DashboardSalesTrendPoint:
      type: object
      properties:
        label:
          type: string
          example: '2026-04-01'
        revenue:
          type: number
        orders:
          type: integer
        refunds:
          type: number
        returns:
          type: integer
        netRevenue:
          type: number

    DashboardStockStatusPoint:
      type: object
      properties:
        label:
          type: string
          enum: [Out of Stock, Below Min Stock, In Stock]
        value:
          type: integer

    DashboardSalesTrendResponse:
      type: object
      required: [status, data]
      properties:
        status:
          $ref: '#/components/schemas/StatusSuccess'
        data:
          type: object
          properties:
            meta:
              allOf:
                - $ref: '#/components/schemas/DashboardMeta'
            series:
              type: array
              items:
                $ref: '#/components/schemas/DashboardSalesTrendPoint'

    DashboardStockStatusResponse:
      type: object
      required: [status, data]
      properties:
        status:
          $ref: '#/components/schemas/StatusSuccess'
        data:
          type: object
          properties:
            meta:
              allOf:
                - $ref: '#/components/schemas/DashboardMeta'
                - type: object
                  properties:
                    asOf:
                      type: string
                      format: date-time
            series:
              type: array
              items:
                $ref: '#/components/schemas/DashboardStockStatusPoint'
            extra:
              type: object
              properties:
                noMinStock:
                  type: integer

    DashboardOverviewResponse:
      type: object
      required: [status, data]
      properties:
        status:
          $ref: '#/components/schemas/StatusSuccess'
        data:
          type: object
          properties:
            meta:
              type: object
              properties:
                workspaceCreatedAt:
                  type: string
                  format: date-time
                  nullable: true
                generatedAt:
                  type: string
                  format: date-time
                mode:
                  type: string
                label:
                  type: string
                from:
                  type: string
                  format: date-time
                to:
                  type: string
                  format: date-time
            inventory:
              type: object
              properties:
                productsCount:
                  type: integer
                categoriesCount:
                  type: integer
                totalStockUnits:
                  type: integer
                inventoryPurchaseValue:
                  type: number
                inventorySaleValue:
                  type: number
                inventoryPotentialProfit:
                  type: number
                outOfStockCount:
                  type: integer
                belowMinStockCount:
                  type: integer
                inStockCount:
                  type: integer
                noMinStockCount:
                  type: integer
            sales:
              type: object
              properties:
                salesInvoicesCount:
                  type: integer
                salesRevenue:
                  type: number
                netRevenue:
                  type: number
            purchases:
              type: object
              properties:
                purchaseInvoicesCount:
                  type: integer
                purchaseSpend:
                  type: number
            returns:
              type: object
              properties:
                returnsCount:
                  type: integer
                refundTotal:
                  type: number
                refundRestockedTotal:
                  type: number
                refundDamagedTotal:
                  type: number
                returnedQtyTotal:
                  type: integer
            profit:
              type: object
              properties:
                inventoryPotentialProfit:
                  type: number
                cogsEstimated:
                  type: number
                realizedProfitEstimated:
                  type: number
            users:
              type: object
              properties:
                usersTotal:
                  type: integer
                adminsCount:
                  type: integer
                workersCount:
                  type: integer
                activeUsersCount:
                  type: integer
                disabledUsersCount:
                  type: integer

    User:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/MongoId'
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, user]
        status:
          type: string
          enum: [active, disabled]
        workspaceId:
          $ref: '#/components/schemas/MongoId'
        maxItemDiscountPercent:
          type: number
          minimum: 0
          maximum: 100
        maxInvoiceDiscountPercent:
          type: number
          minimum: 0
          maximum: 100
        createdAt:
          type: string
          format: date-time

    UserCreateRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Ahmed
        email:
          type: string
          format: email
          example: ahmed@mail.com
        password:
          type: string
          minLength: 6
          example: '123456'
        role:
          type: string
          enum: [admin, user]
          default: user

    UpdateUserStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, disabled]

    UpdateUserDiscountLimitsRequest:
      type: object
      properties:
        maxItemDiscountPercent:
          type: number
          minimum: 0
          maximum: 100
          example: 10
        maxInvoiceDiscountPercent:
          type: number
          minimum: 0
          maximum: 100
          example: 15

    UserResponse:
      type: object
      required: [status, data]
      properties:
        status:
          $ref: '#/components/schemas/StatusSuccess'
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
            message:
              type: string

    UserListResponse:
      type: object
      required: [status, data]
      properties:
        status:
          $ref: '#/components/schemas/StatusSuccess'
        data:
          type: object
          properties:
            ownerUserId:
              $ref: '#/components/schemas/MongoId'
            count:
              type: integer
            users:
              type: array
              items:
                $ref: '#/components/schemas/User'

    WorkspaceUpdateNameRequest:
      type: object
      properties:
        name:
          type: string
          example: New Workspace Name
        workspaceName:
          type: string
          example: New Workspace Name

    WorkspaceResponse:
      type: object
      required: [status, data]
      properties:
        status:
          $ref: '#/components/schemas/StatusSuccess'
        data:
          type: object
          properties:
            workspace:
              $ref: '#/components/schemas/WorkspacePublic'

security:
  - bearerAuth: []

paths:
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register workspace owner admin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegisterRequest'
      responses:
        '201':
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterSuccessResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendError'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendError'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '400':
          description: Missing email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendError'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendError'
        '403':
          description: User disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendError'

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout current session family by incrementing tokenVersion
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccess'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendError'

  /api/products:
    get:
      tags: [Products]
      summary: List products in current workspace
      responses:
        '200':
          description: Products list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
    post:
      tags: [Products]
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Validation or allowlist error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '409':
          description: Product id already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'

  /api/products/low-stock:
    get:
      tags: [Products]
      summary: List low stock products using per-product minStock
      responses:
        '200':
          description: Low stock products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'

  /api/products/search:
    get:
      tags: [Products]
      summary: Search products
      parameters:
        - in: query
          name: id
          schema:
            type: string
          description: Case-insensitive partial match.
        - in: query
          name: name
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
      responses:
        '200':
          description: Search result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'

  /api/products/auto-complete:
    get:
      tags: [Products]
      summary: Auto-complete products by id or name
      parameters:
        - in: query
          name: query
          schema:
            type: string
      responses:
        '200':
          description: Suggestions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'

  /api/products/auto-fill:
    get:
      tags: [Products]
      summary: Auto-fill product by business id or exact name
      parameters:
        - in: query
          name: id
          schema:
            type: string
        - in: query
          name: name
          schema:
            type: string
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: id or name missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '409':
          description: Multiple products have same name
          content:
            application/json:
              schema:
                type: object
                required: [status, data]
                properties:
                  status:
                    $ref: '#/components/schemas/StatusFail'
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                      candidates:
                        type: array
                        items:
                          $ref: '#/components/schemas/ProductAutoFillConflictCandidate'

  /api/products/{id}:
    put:
      tags: [Products]
      summary: Update product by business id
      parameters:
        - $ref: '#/components/parameters/ProductBusinessIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdateRequest'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Validation or allowlist error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '409':
          description: New product id already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
    delete:
      tags: [Products]
      summary: Delete product by business id
      parameters:
        - $ref: '#/components/parameters/ProductBusinessIdParam'
      responses:
        '200':
          description: Product deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccess'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'

  /api/products/{id}/adjust-stock:
    patch:
      tags: [Products]
      summary: Adjust product stock manually
      parameters:
        - $ref: '#/components/parameters/ProductBusinessIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductAdjustStockRequest'
      responses:
        '200':
          description: Stock adjusted and movement logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductAdjustStockResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '409':
          description: Stock changed, retry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'

  /api/products/{id}/movements:
    get:
      tags: [Stock Movements]
      summary: List stock movements for a product
      parameters:
        - $ref: '#/components/parameters/ProductBusinessIdParam'
        - in: query
          name: type
          schema:
            type: string
            enum: [purchase, sale, sale_return, adjustment]
        - in: query
          name: refType
          schema:
            type: string
        - in: query
          name: refCode
          schema:
            type: string
        - in: query
          name: performedByName
          schema:
            type: string
        - in: query
          name: performedByUserId
          schema:
            $ref: '#/components/schemas/MongoId'
        - in: query
          name: reason
          schema:
            type: string
        - in: query
          name: direction
          schema:
            type: string
            enum: [in, out]
        - in: query
          name: from
          schema:
            type: string
            format: date
        - in: query
          name: to
          schema:
            type: string
            format: date
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Product movement history
