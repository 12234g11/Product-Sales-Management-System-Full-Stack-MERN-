      summary: Update user discount limits
      description: Admin only.
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserDiscountLimitsRequest'
      responses:
        '200':
          description: Discount limits updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '403':
          description: User not in workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '404':
          description: User or workspace not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'

  /api/workspaces/name:
    patch:
      tags: [Workspaces]
      summary: Update workspace name
      description: Admin only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceUpdateNameRequest'
      responses:
        '200':
          description: Workspace name updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceResponse'
        '400':
          description: Validation or allowlist error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '404':
          description: Workspace not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendError'

  /api/workspaces/deleteworkspace:
    delete:
      tags: [Workspaces]
      summary: Delete current workspace permanently
      description: Admin + workspace owner only.
      responses:
        '200':
          description: Workspace deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccess'
        '403':
          description: Only workspace owner can delete it
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendError'
        '404':
          description: Workspace not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendError'
